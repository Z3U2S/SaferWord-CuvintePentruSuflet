<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaferWord</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="background"></div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="navbar-brand">✝ SaferWord</div>
  <div class="navbar-right">
    <span id="userDisplay"></span>
    <button class="btn-admin-nav" id="adminNavBtn" onclick="toggleAdminPanel()" style="display:none;">⚙️ Admin</button>
    <button class="btn-login-nav" id="loginNavBtn" onclick="toggleModal('loginModal')">Login</button>
    <button class="btn-logout-nav" id="logoutNavBtn" onclick="logout()" style="display:none;">Logout</button>
  </div>
</div>

<!-- MODAL LOGIN -->
<div class="modal-overlay" id="loginModal" onclick="closeModalOutside(event, 'loginModal')">
  <div class="modal-box">
    <button class="modal-close" onclick="toggleModal('loginModal')">✕</button>
    <h2 id="modalTitle">Conectează-te</h2>
    <p id="modalSubtitle">Bine ai revenit în comunitate</p>
    <input id="loginEmail" type="email" placeholder="Email" />
    <input id="loginPassword" type="password" placeholder="Parolă" />
    <button class="btn-primary" onclick="loginEmail()">Intră cu email</button>
    <div class="modal-divider"><span>sau</span></div>
    <button class="btn-google" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continuă cu Google
    </button>
    <p class="modal-toggle" onclick="toggleRegisterMode()">
      <span id="toggleText">Nu ai cont? Înregistrează-te</span>
    </p>
  </div>
</div>

<!-- MODAL COMENTARII -->
<div class="modal-overlay" id="commentModal" onclick="closeModalOutside(event, 'commentModal')">
  <div class="modal-box modal-box--wide">
    <button class="modal-close" onclick="toggleModal('commentModal')">✕</button>
    <h2 id="commentModalTitle">Comentarii</h2>
    <div id="commentsList" class="comments-list"></div>
    <div class="comment-form" id="commentForm" style="display:none;">
      <textarea id="commentInput" placeholder="Scrie un comentariu..."></textarea>
      <button class="btn-primary" onclick="submitComment()">Trimite</button>
    </div>
    <p class="comment-login-msg" id="commentLoginMsg" style="display:none;">
      <a onclick="toggleModal('commentModal'); toggleModal('loginModal')">Loghează-te</a> pentru a comenta.
    </p>
  </div>
</div>

<!-- MODAL RAPORTARE -->
<div class="modal-overlay" id="reportModal" onclick="closeModalOutside(event, 'reportModal')">
  <div class="modal-box">
    <button class="modal-close" onclick="toggleModal('reportModal')">✕</button>
    <h2>Raportează postarea</h2>
    <p style="font-size:13px; color:#888; margin:0 0 8px;">Spune-ne de ce raportezi această postare:</p>
    <div class="report-options">
      <label><input type="radio" name="reportReason" value="Limbaj inadecvat"> Limbaj inadecvat</label>
      <label><input type="radio" name="reportReason" value="Conținut fals"> Conținut fals</label>
      <label><input type="radio" name="reportReason" value="Spam"> Spam</label>
      <label><input type="radio" name="reportReason" value="Alt motiv"> Alt motiv</label>
    </div>
    <textarea id="reportExtra" placeholder="Detalii suplimentare (opțional)..."></textarea>
    <button class="btn-primary" onclick="submitReport()">Trimite raportul</button>
  </div>
</div>

<div class="container">
  <div class="branding">
    <h1>Resursa ta pentru suflet</h1>
    <p>Cântece și Poezii Creștine</p>
  </div>

  <!-- PANOU ADMIN -->
  <div class="admin-panel" id="adminPanel" style="display:none;">
    <div class="admin-header">
      <h2>⚙️ Panou Admin</h2>
      <div class="admin-tabs">
        <button class="tab-btn active" onclick="switchTab('reported')">🚨 Raportate</button>
        <button class="tab-btn" onclick="switchTab('badwords')">🚫 Cuvinte interzise</button>
      </div>
    </div>
    <div id="tab-reported">
      <div id="reportedList"><p class="empty-msg">Se încarcă...</p></div>
    </div>
    <div id="tab-badwords" style="display:none;">
      <div class="badword-add">
        <input id="newBadword" placeholder="Adaugă cuvânt interzis..." />
        <button onclick="addBadword()">Adaugă</button>
      </div>
      <div id="badwordsList"></div>
    </div>
  </div>

  <div class="menu">
    <button onclick="incarcaToate()">🏠 Home</button>
    <button onclick="incarcaPoezii()">📜 Poezii</button>
    <button onclick="incarcaCantece()">🎵 Cântece</button>
  </div>

  <input id="search" placeholder="🔍 Caută..." oninput="searchPosts()">

  <div class="glass" id="formSection" style="display:none;">
    <input id="title" placeholder="Titlu" />
    <input id="author" placeholder="Autor" />
    <textarea id="content" placeholder="Scrie aici..."></textarea>
    <select id="type">
      <option value="poezie">Poezie</option>
      <option value="cantec">Cântec</option>
    </select>
    <button onclick="adaugaPost()">Publică</button>
  </div>

  <div id="posts"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="app.js"></script>
</body>
</html>
